spec_version: 1
name: network-diagnostics-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

graders:
  - id: connectivity
    endpoint: /grader/connectivity
    method: POST
    description: >
      Grades connectivity-domain tasks: DNS failure, DHCP starvation, firewall block.
    input_fields:
      - scenario_id
      - root_cause_submitted
      - steps_taken
      - tool_cost_sum
    score_field: score
    pass_threshold: 0.5

  - id: infrastructure
    endpoint: /grader/infrastructure
    method: POST
    description: >
      Grades infrastructure-domain tasks: NTP drift, cascading BGP failure, routing loop.
    input_fields:
      - scenario_id
      - root_cause_submitted
      - steps_taken
      - tool_cost_sum
    score_field: score
    pass_threshold: 0.5

  - id: distributed
    endpoint: /grader/distributed
    method: POST
    description: >
      Grades distributed-systems tasks: split-brain cluster, replica lag, job queue stall.
    input_fields:
      - scenario_id
      - root_cause_submitted
      - steps_taken
      - tool_cost_sum
    score_field: score
    pass_threshold: 0.5

tasks:
  # ── GRADER: connectivity ──────────────────────────────────────────────────
  - id: dns_failure
    name: DNS Server Failure
    difficulty: easy
    grader: connectivity
    description: >
      The DNS server has crashed due to a misconfiguration in /etc/named.conf.
      Hosts can no longer resolve domain names.
      Identify the root cause and submit a ResolveAction.
    max_steps: 10

  - id: dhcp_starvation
    name: DHCP Pool Exhaustion
    difficulty: easy
    grader: connectivity
    description: >
      New hosts fail to obtain IP addresses. The DHCP server pool is exhausted
      because a rogue device is flooding DHCP requests.
      Identify the root cause and submit a ResolveAction.
    max_steps: 10

  - id: firewall_block
    name: Firewall Blocking Outbound Traffic
    difficulty: medium
    grader: connectivity
    description: >
      An iptables rule on the internet-router is silently dropping all outbound
      packets from host-a. Internal traffic works; only internet access is broken.
      Identify the firewall rule causing the drop and submit a ResolveAction.
    max_steps: 15

  # ── GRADER: infrastructure ────────────────────────────────────────────────
  - id: ntp_drift
    name: NTP Clock Skew Breaking TLS
    difficulty: medium
    grader: infrastructure
    description: >
      Internal HTTPS services are failing with TLS certificate validation errors.
      The ntp-server process crashed and host clocks have drifted by more than 5 minutes.
      Identify the root cause and submit a ResolveAction.
    max_steps: 15

  - id: cascading_failure
    name: Cascading Multi-Hop Service Failure
    difficulty: hard
    grader: infrastructure
    description: >
      A web server is returning 502 errors. Trace the full dependency chain
      to find the true root cause: a BGP peer reset on core-router caused the
      database to lose its route, exhausting the app-server connection pool.
    max_steps: 25

  - id: routing_loop
    name: Static Route Causing Routing Loop
    difficulty: medium
    grader: infrastructure
    description: >
      Packets to subnet 10.2.0.0/24 are being forwarded in a loop between
      router-a and router-b, causing 100% packet loss and high CPU.
      Identify the misconfigured static route and submit a ResolveAction.
    max_steps: 15

  # ── GRADER: distributed ───────────────────────────────────────────────────
  - id: split_brain
    name: Split-Brain Cluster with Stale Leader
    difficulty: hard
    grader: distributed
    description: >
      Two cluster nodes claim leadership after a network partition.
      A misconfigured heartbeat timeout caused a premature leader election.
      Identify the root cause and submit a ResolveAction.
    max_steps: 30

  - id: replica_lag
    name: Database Replica Lag Causing Stale Reads
    difficulty: medium
    grader: distributed
    description: >
      Read queries to the database read-replica return data that is 30+ seconds old.
      The replica I/O thread is stuck because the primary binary log was rotated
      and the replica was not updated with the new log position.
      Identify the root cause and submit a ResolveAction.
    max_steps: 15

  - id: job_queue_stall
    name: Distributed Job Queue Stall
    difficulty: easy
    grader: distributed
    description: >
      Background jobs have stopped processing for 20 minutes.
      All workers are crash-looping on startup due to a missing environment variable.
      Identify the root cause and submit a ResolveAction.
    max_steps: 10

observation:
  type: object
  properties:
    stdout:
      type: string
      description: Terminal output of the last command
    stderr:
      type: string
      description: Error output, if any
    exit_code:
      type: integer
      description: "0 = success"
    available_tools:
      type: array
      description: Populated after ListToolsAction
    tool_result:
      type: object
      description: Raw result from the last tool call
    done:
      type: boolean
      description: True when episode is complete
    reward:
      type: number
      description: Per-step reward signal

action:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - NetAction
        - ListToolsAction
        - CallToolAction
        - ResolveAction
    command:
      type: string
    tool_name:
      type: string
    tool_params:
      type: object
    root_cause:
      type: string
    fix_applied:
      type: string

endpoints:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  tasks:
    method: GET
    path: /tasks
  baseline:
    method: GET
    path: /baseline
  schema:
    method: GET
    path: /schema
