version: "1.0"

name: "network-diagnostics-env"

description: "An OpenEnv-compliant environment for evaluating AI agents on autonomous network troubleshooting. 9 tasks across 3 grader domains (connectivity / infrastructure / distributed)."

entry_point: "server.app:app"

author: "MetaPyTorch Team"

license: "MIT"

tasks:
  # ── GRADER: /grader/connectivity ─────────────────────────────────────────
  - id: "dns_failure"
    grader: "server.app:grader_connectivity"
    name: "DNS Server Failure"
    description: "The DNS server crashed due to a misconfiguration in /etc/named.conf. Hosts can no longer resolve domain names. Identify the root cause and submit a ResolveAction."
    difficulty: "easy"
    max_steps: 10

  - id: "dhcp_starvation"
    grader: "server.app:grader_connectivity"
    name: "DHCP Pool Exhaustion"
    description: "New hosts fail to obtain IP addresses. The DHCP pool is exhausted due to a rogue device flooding DHCP requests. Identify the root cause and submit a ResolveAction."
    difficulty: "easy"
    max_steps: 10

  - id: "firewall_block"
    grader: "server.app:grader_connectivity"
    name: "Firewall Blocking Outbound Traffic"
    description: "An iptables rule on the internet-router silently drops all outbound packets from host-a. Internal traffic works; internet access is broken. Identify the rule and submit a ResolveAction."
    difficulty: "medium"
    max_steps: 15

  # ── GRADER: /grader/infrastructure ───────────────────────────────────────
  - id: "ntp_drift"
    grader: "server.app:grader_infrastructure"
    name: "NTP Clock Skew Breaking TLS"
    description: "Internal HTTPS services fail with TLS certificate errors. The ntp-server crashed and host clocks drifted by more than 5 minutes. Identify the root cause and submit a ResolveAction."
    difficulty: "medium"
    max_steps: 15

  - id: "cascading_failure"
    grader: "server.app:grader_infrastructure"
    name: "Cascading Multi-Hop Service Failure"
    description: "A web server returns 502 errors. Trace the full chain: BGP peer reset on core-router caused the database to lose its route, exhausting the app-server connection pool. Submit a ResolveAction."
    difficulty: "hard"
    max_steps: 25

  - id: "routing_loop"
    grader: "server.app:grader_infrastructure"
    name: "Static Route Causing Routing Loop"
    description: "Packets to subnet 10.2.0.0/24 loop between router-a and router-b, causing 100% packet loss and high CPU. Identify the misconfigured static route and submit a ResolveAction."
    difficulty: "medium"
    max_steps: 15

  # ── GRADER: /grader/distributed ──────────────────────────────────────────
  - id: "split_brain"
    grader: "server.app:grader_distributed"
    name: "Split-Brain Cluster with Stale Leader"
    description: "Two cluster nodes claim leadership after a network partition. A misconfigured heartbeat timeout caused a premature election. Identify the root cause and submit a ResolveAction."
    difficulty: "hard"
    max_steps: 30

  - id: "replica_lag"
    grader: "server.app:grader_distributed"
    name: "Database Replica Lag Causing Stale Reads"
    description: "Read queries return data 30+ seconds old. The replica I/O thread is stuck because the primary binary log was rotated without updating the replica log position. Submit a ResolveAction."
    difficulty: "medium"
    max_steps: 15

  - id: "job_queue_stall"
    grader: "server.app:grader_distributed"
    name: "Distributed Job Queue Stall"
    description: "Background jobs stopped processing. All workers crash-loop on startup due to a missing environment variable. Identify the root cause and submit a ResolveAction."
    difficulty: "easy"
    max_steps: 10

observation_space: "NetObservation"

action_space: "NetAction"

endpoints:
  health: /health
  reset: /reset
  step: /step
  state: /state
  grade: /grader
  tasks: /tasks
  baseline: /baseline

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.5
  score_formula: mean(step_rewards)
